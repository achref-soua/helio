[project]
name = "helio-sdk"
version = "0.0.0"
description = "Helio's Python SDK: a typed client for the public REST API."
license = "AGPL-3.0-only"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helio_sdk"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4"]

[tool.mypy]
strict = true
files = ["src"]

[tool.pytest.ini_options]
addopts = "--cov=helio_sdk --cov-report=term --cov-fail-under=80"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src"]
