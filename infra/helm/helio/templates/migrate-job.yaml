{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "helio.fullname" . }}-migrate
  labels:
    {{- include "helio.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the application starts, on install and upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "helio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "helio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ required "migrations.image is required when migrations.enabled is true" .Values.migrations.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "helio.fullname" . }}-config
            - secretRef:
                name: {{ include "helio.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
