# Helio self-host stack — the file `helio install` runs. Image tags are
# pinned to one release by the bundle build (never `latest`), so an install
# is reproducible and `helio update` is an explicit, backed-up step.
#
# Profiles:
#   core  (default) — dashboard, REST API, AI service, Postgres, Redis, and
#                     Mailpit as the fallback test inbox. ~2.5 GB RAM.
#   full            — adds event ingestion + tracking + journey/campaign
#                     workers and their stores (ClickHouse, Redpanda,
#                     Temporal). Recommended ≥ 8 GB RAM.
#
# Postgres and Redis are deliberately NOT exposed to the host; the admin
# surfaces for them live inside Helio (Database Studio, backups).

# Distinct from the source-checkout dev stack's project ("helio") — sharing
# a project name would silently adopt its containers and named volumes.
name: helio-selfhost

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set by the installer}
      POSTGRES_DB: ${POSTGRES_DB:-helio}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-helio}']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '${MAILPIT_UI_PORT:-8025}:8025'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025/readyz']
      interval: 10s
      timeout: 5s
      retries: 12

  backup:
    image: ghcr.io/achref-soua/helio-backup:__HELIO_VERSION__
    restart: unless-stopped
    environment:
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_TIME: ${BACKUP_TIME:-03:30}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:-}
    volumes:
      - ${HELIO_BACKUPS_PATH:-./backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: ghcr.io/achref-soua/helio-migrate:__HELIO_VERSION__
    profiles: ['ops']
    environment:
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      HELIO_APP_DB_PASSWORD: ${HELIO_APP_DB_PASSWORD}
      HELIO_ENCRYPTION_KEY: ${HELIO_ENCRYPTION_KEY}
      HELIO_ENCRYPTION_KEY_PREVIOUS: ${HELIO_ENCRYPTION_KEY_PREVIOUS:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/achref-soua/helio-web:__HELIO_VERSION__
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgresql://helio_app:${HELIO_APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET}
      HELIO_ENCRYPTION_KEY: ${HELIO_ENCRYPTION_KEY}
      HELIO_ENCRYPTION_KEY_PREVIOUS: ${HELIO_ENCRYPTION_KEY_PREVIOUS:-}
      HELIO_UPDATE_CHECK: ${HELIO_UPDATE_CHECK:-true}
      # One-click in-app updates: when true (with the `update` profile), the
      # owner can update from Settings → Updates. The shared secret lets the
      # dashboard authorize its request to the updater sidecar.
      HELIO_INAPP_UPDATE: ${HELIO_INAPP_UPDATE:-false}
      HELIO_UPDATE_SECRET: ${HELIO_UPDATE_SECRET:-}
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      MAIL_FROM: ${MAIL_FROM:-Helio <no-reply@helio.local>}
      TEMPORAL_ADDRESS: temporal:7233
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-helio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-helio}
      INTELLIGENCE_URL: http://intelligence:8000
      # Admin → Health checks (service-DNS targets inside the network).
      API_URL: http://api:4000
      INGEST_URL: http://ingest:4100
      TRACKING_URL: http://tracking:4200
      REDIS_URL: redis://redis:6379
      # Invite-only by default: the first-run wizard creates the team.
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      BACKUPS_PANEL_ENABLED: ${BACKUPS_PANEL_ENABLED:-true}
      HELIO_BACKUPS_PATH: /var/lib/helio/backups
    volumes:
      - ${HELIO_BACKUPS_PATH:-./backups}:/var/lib/helio/backups:ro
      # Shared with the updater sidecar: the dashboard drops update requests
      # here and reads back status (no-op unless the `update` profile is on).
      - update-state:/var/lib/helio/update-state
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/api/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      # First boots on modest machines (cold WSL2, first ClickHouse init)
      # can take minutes before the server binds; failures inside the
      # grace window must not mark the service unhealthy.
      start_period: 120s

  api:
    image: ghcr.io/achref-soua/helio-api:__HELIO_VERSION__
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://helio_app:${HELIO_APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      REDIS_URL: redis://redis:6379
      EMAIL_WEBHOOK_TOKEN: ${EMAIL_WEBHOOK_TOKEN:-}
      SMS_WEBHOOK_TOKEN: ${SMS_WEBHOOK_TOKEN:-}
      HELIO_ENCRYPTION_KEY: ${HELIO_ENCRYPTION_KEY}
      HELIO_ENCRYPTION_KEY_PREVIOUS: ${HELIO_ENCRYPTION_KEY_PREVIOUS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4000/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      # First boots on modest machines (cold WSL2, first ClickHouse init)
      # can take minutes before the server binds; failures inside the
      # grace window must not mark the service unhealthy.
      start_period: 120s

  intelligence:
    image: ghcr.io/achref-soua/helio-intelligence:__HELIO_VERSION__
    restart: unless-stopped
    environment:
      INTEL_DATABASE_URL: postgresql://helio_app:${HELIO_APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      INTEL_LLM_PROVIDER: ${INTEL_LLM_PROVIDER:-groq}
      INTEL_LLM_MODEL: ${INTEL_LLM_MODEL:-llama-3.3-70b-versatile}
      INTEL_LLM_API_KEY: ${INTEL_LLM_API_KEY:-}
      HELIO_ENCRYPTION_KEY: ${HELIO_ENCRYPTION_KEY}
      HELIO_ENCRYPTION_KEY_PREVIOUS: ${HELIO_ENCRYPTION_KEY_PREVIOUS:-}
      INTEL_CLICKHOUSE_URL: http://clickhouse:8123
      INTEL_CLICKHOUSE_USER: ${CLICKHOUSE_USER:-helio}
      INTEL_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      INTEL_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-helio}
      INTEL_MODELS_PATH: /var/lib/helio/models
      # LAN model servers are the normal self-host case.
      INTEL_ALLOW_PRIVATE_MODEL_ENDPOINTS: 'true'
    volumes:
      - models-data:/var/lib/helio/models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://localhost:8000/healthz'', timeout=4).status==200 else 1)"',
        ]
      interval: 15s
      timeout: 6s
      retries: 12
      # Same first-boot grace as the node services.
      start_period: 120s

  # ── update profile (optional one-click in-app update) ───────────────────
  # The sidecar that performs dashboard-triggered updates. It is the ONLY
  # container that mounts the Docker socket, and it runs nothing but the
  # fixed `helio update` (the dashboard's request carries no command). It is
  # entirely optional: drop the `update` profile and it never starts — no
  # sidecar, no socket. The terminal `helio update` works either way.
  # See SECURITY.md for the trust model.
  updater:
    image: ghcr.io/achref-soua/helio-updater:__HELIO_VERSION__
    profiles: ['update']
    restart: unless-stopped
    environment:
      # Authorizes the dashboard's update request; shared with the web app.
      HELIO_UPDATE_SECRET: ${HELIO_UPDATE_SECRET:?set by the installer}
      # The image the sidecar launches the (detached) update worker from.
      HELIO_UPDATER_IMAGE: ghcr.io/achref-soua/helio-updater:__HELIO_VERSION__
      HELIO_COMPOSE_PROJECT: helio-selfhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-only — used only to discover the install dir's host path; the
      # detached worker mounts that same path read-write to run the update.
      - ./:/helio-home:ro
      - update-state:/state

  # ── full profile ────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    profiles: ['full']
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-helio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-helio}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: 262144
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8123/ping || exit 1']
      interval: 10s
      timeout: 5s
      retries: 18
      # First boot creates the user and database before the HTTP port
      # binds; on a cold WSL2 disk that init runs long enough that, without
      # a grace window, `up --wait` declares ClickHouse failed before it has
      # finished initializing. Mirrors the web service's start_period above.
      start_period: 120s

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    profiles: ['full']
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health | grep -q "Healthy:.*true"']
      interval: 10s
      timeout: 8s
      retries: 18

  temporal:
    image: temporalio/auto-setup:1.26
    profiles: ['full']
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-helio}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'temporal operator cluster health --address temporal:7233 || exit 1']
      interval: 15s
      timeout: 8s
      retries: 20

  ingest:
    image: ghcr.io/achref-soua/helio-ingest:__HELIO_VERSION__
    profiles: ['full']
    restart: unless-stopped
    ports:
      - '${INGEST_PORT:-4100}:4100'
    environment:
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-helio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-helio}
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      REDIS_URL: redis://redis:6379
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4100/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      # First boots on modest machines (cold WSL2, first ClickHouse init)
      # can take minutes before the server binds; failures inside the
      # grace window must not mark the service unhealthy.
      start_period: 120s

  tracking:
    image: ghcr.io/achref-soua/helio-tracking:__HELIO_VERSION__
    profiles: ['full']
    restart: unless-stopped
    ports:
      - '${TRACKING_PORT:-4200}:4200'
    environment:
      TRACKING_SECRET: ${TRACKING_SECRET}
      PUBLIC_TRACKING_URL: ${PUBLIC_TRACKING_URL:-http://localhost:4200}
      KAFKA_BROKERS: redpanda:9092
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4200/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      # First boots on modest machines (cold WSL2, first ClickHouse init)
      # can take minutes before the server binds; failures inside the
      # grace window must not mark the service unhealthy.
      start_period: 120s

  workers:
    image: ghcr.io/achref-soua/helio-workers:__HELIO_VERSION__
    profiles: ['full']
    restart: unless-stopped
    environment:
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-helio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helio}
      TEMPORAL_ADDRESS: temporal:7233
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      MAIL_FROM: ${MAIL_FROM:-Helio <no-reply@helio.local>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PUBLIC_TRACKING_URL: ${PUBLIC_TRACKING_URL:-http://localhost:4200}
      TRACKING_SECRET: ${TRACKING_SECRET}
      UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET}
      HELIO_ENCRYPTION_KEY: ${HELIO_ENCRYPTION_KEY}
      HELIO_ENCRYPTION_KEY_PREVIOUS: ${HELIO_ENCRYPTION_KEY_PREVIOUS:-}
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-helio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-helio}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  postgres-data:
  models-data:
  redis-data:
  clickhouse-data:
  redpanda-data:
  # The dashboard writes update requests here; the updater sidecar reads them
  # and publishes status the dashboard polls back across the restart.
  update-state:
