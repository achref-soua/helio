name: helio

# Local development stack.
#   core profile: Postgres + Redis + Mailpit — everything the app needs day-to-day.
#   full profile (later phases): adds ClickHouse, Redpanda, Temporal, MinIO.
# Bring up via `task up` from the repo root.

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: [core, full]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helio_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-helio}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: [core, full]
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    profiles: [core, full]
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025' # SMTP — all dev email lands here
      - '${MAILPIT_UI_PORT:-8025}:8025' # Web UI
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
