name: Feature request
description: Suggest an improvement or new capability
title: '[feat] '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is painful?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
