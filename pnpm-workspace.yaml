packages:
  - apps/*
  - packages/*
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: false
  cpu-features: false
  esbuild: true
  lefthook: true
  prisma: true
  protobufjs: false
  sharp: true
  ssh2: false
minimumReleaseAgeExclude:
  - '@better-auth/api-key@1.6.15'
  - '@better-auth/core@1.6.15'
  - '@better-auth/drizzle-adapter@1.6.15'
  - '@better-auth/kysely-adapter@1.6.15'
  - '@better-auth/memory-adapter@1.6.15'
  - '@better-auth/mongo-adapter@1.6.15'
  - '@better-auth/prisma-adapter@1.6.15'
  - '@better-auth/sso@1.6.15'
  - '@better-auth/telemetry@1.6.15'
  - better-auth@1.6.15
overrides:
  kysely: ^0.28.17
  # Security (Dependabot): bump vulnerable transitive versions. protobufjs
  # and postcss already resolve safe copies elsewhere in the tree; these
  # ranges unify the stragglers. @hono/node-server is scoped to the 1.x line
  # so the safe direct 2.x dependency isn't downgraded.
  protobufjs: ^7.5.8
  postcss: ^8.5.10
  '@hono/node-server@1': '>=1.19.13 <2'
